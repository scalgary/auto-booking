name: 'Load Registration Parameters'
description: 'Load registration from JSON or manual inputs'

inputs:
  event_name:
    description: 'GitHub event name'
    required: true
  json_file:
    description: 'Path to JSON registration file'
    required: false
    default: 'his_registrations.json'


outputs:
  date:
    description: 'Registration date'
    value: ${{ steps.load.outputs.date }}
  time:
    description: 'Registration time'
    value: ${{ steps.load.outputs.time }}
  level:
    description: 'Registration level'
    value: ${{ steps.load.outputs.level }}
  day:
    description: 'Registration day'
    value: ${{ steps.load.outputs.day }}
  should_continue:
    description: 'Should workflow continue'
    value: ${{ steps.load.outputs.should_continue }}

runs:
  using: 'composite'
  steps:
    - name: Load registration
      id: load
      shell: bash
      run: |
        echo "======================================"
        echo "📖 Loading registration parameters"
        echo "======================================"

        JSON_FILE="${{ inputs.json_file }}"
        echo "📄 Using JSON file: $JSON_FILE"
          

        # Vérifier que le fichier existe
        if [ ! -f "$JSON_FILE" ]; then
          echo "❌ JSON file not found: $JSON_FILE"
          echo "should_continue=false" >> $GITHUB_OUTPUT
          exit 0
        fi
            
        # Récupérer le jour actuel
        current_day=$(date -u +%A)
        echo "📅 Current day (UTC): $current_day"
        
        # Chercher la registration pour aujourd'hui
        registration=$(jq -r --arg day "$current_day" \
          '.[] | select(.day == $day) | "\(.date)|\(.time)|\(.day)|\(.level)"' \
          "$JSON_FILE" | head -1)
          
        # Vérifier si une registration existe
        if [ -z "$registration" ]; then
          echo "❌ No registration found for $current_day in $JSON_FILE"
          echo "should_continue=false" >> $GITHUB_OUTPUT
          exit 0
        fi
            
        # Split et afficher
        IFS='|' read -r date time day level <<< "$registration"
        echo "✅ Registration found:"
        echo "   📅 Date: $date"
        echo "   🕐 Time: $time"
        echo "   📆 Day: $day"
        echo "   🎾 Level: $level"
        
        # Check if registration date is more than 10 days away
        today_epoch=$(date -u +%s)
        reg_date_epoch=$(date -u -d "$date" +%s)
        days_diff=$(( (reg_date_epoch - today_epoch) / 86400 ))
        echo "📅 Days until registration: $days_diff"
      
        if [ "$days_diff" -lt 0 ] || [ "$days_diff" -gt 10 ]; then
         echo "⏳ Registration date is out of range ($days_diff days) — skipping"
         echo "should_continue=false" >> $GITHUB_OUTPUT
        else
         echo "should_continue=true" >> $GITHUB_OUTPUT
         # Exporter vers GITHUB_OUTPUT
         echo "date=$date" >> $GITHUB_OUTPUT
         echo "time=$time" >> $GITHUB_OUTPUT
         echo "day=$day" >> $GITHUB_OUTPUT
         echo "level=$level" >> $GITHUB_OUTPUT
        fi 

        echo "======================================"