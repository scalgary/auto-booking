name: Bot Pickleball for HIS

env:
  TARGET_UTC_HOUR : 14
  MAX_WAIT_SECONDS: 1800  
  ADVANCE_SECONDS: 1
  TAG_PREFIX: 'his'  # ← Change 'my' ou 'his'
  REGISTRATION_JSON_FILE: 'his_registrations.json'  # ← Change ici
  HOLD_STATUS: True
permissions:
  contents: write
  actions: read
  packages: read

on:
  #schedule:
    # Fenêtre de booking: 14:45-14:59 UTC (23:45-23:59 Calgary MST)

  workflow_dispatch:  # Ajoutez cette ligne

# Empêche les exécutions concurrentes
concurrency:
  group: auto-booking-his-bot
  cancel-in-progress: false  # Queue au lieu de cancel

jobs:
  register:
    runs-on: ubuntu-latest
    # Utilise ton image Docker personnalisée depuis GHCR
    container:
      image: ghcr.io/scalgary/selenium-env:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --workdir ${{ github.workspace }}
    steps:
      # ==========================================
      # STEP 1: Checkout code and fetch tags
      # ==========================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Load registration parameters
        id: params                                           # ← ID du step
        uses: ./.github/actions/load-params
        with: 
          json_file: ${{ env.REGISTRATION_JSON_FILE }}
          event_name: ${{ github.event_name }}   

      - name: Git setup and fetch tags
        if: steps.params.outputs.should_continue == 'true'
        run: |
          pwd
          ls -la
          echo "🔧 Configuring Git..."
          git config --global --add safe.directory $GITHUB_WORKSPACE
          git config user.name "bot"
          git config user.email "bot@github.com"
          echo "🏷️ Fetching tags from remote..."
          git fetch --tags
          echo "✅ Tags fetched successfully"

      # ==========================================
      # STEP 2: Check tag and timing
      # ==========================================
      - name: Check tag & timing
        id: check
        shell: bash
        if: steps.params.outputs.should_continue == 'true'
        run: |
          echo "======================================"
          echo "🕐 Checking timing and tags"
          echo "======================================"
          # Récupérer les paramètres
          TARGET_HOUR=${{ env.TARGET_UTC_HOUR }}
          ADVANCE_SEC=${{ env.ADVANCE_SECONDS }}
          MAX_WAIT=${{ env.MAX_WAIT_SECONDS }}

          echo "🎯 Target UTC hour: ${TARGET_HOUR}:00"
          echo "⏰ Will start ${ADVANCE_SEC} seconds early"

          # POUR TEST MANUEL SEULEMENT


          target_date="${{ steps.params.outputs.date }}"
          prefix="${{ env.TAG_PREFIX }}"
          tag="${prefix}_bot_success_${target_date}"
          echo "🏷️ Tag prefix: $prefix"
          echo "🔍 Looking for tag: $tag"
          
          # Check if tag already exists
          if git tag -l | grep -q "^${tag}$"; then
            echo "🏷️ ✅ Success tag already exists: $tag"
            echo "🛑 Stopping workflow (success already registered)"
            echo "should_continue=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "📝 Tag not found, continuing..."
          
          # Get current UTC time
          current_hour=$((10#$(date -u +%H)))
          current_minute=$((10#$(date -u +%M)))
          current_second=$((10#$(date -u +%S)))
          current_total_seconds=$(( (current_hour * 3600) + (current_minute * 60) + current_second ))

          echo "🕐 Current UTC time: ${current_hour}:${current_minute}:${current_second}"
          
          # Calcul avec l'avance
          target_total_seconds=$(( (TARGET_HOUR * 3600) - ADVANCE_SEC ))
          diff_seconds=$(( target_total_seconds - current_total_seconds ))
          diff_minutes=$(( diff_seconds / 60 ))
          echo "⏱️ Difference: $diff_seconds seconds ($diff_minutes minutes) avant l'heure cible"

          # Timing logic
          if [ $diff_seconds -gt $MAX_WAIT ]; then
            echo "❌ Too early: $diff_seconds seconds remaining (> 10 minutes)"
            echo "🛑 Stopping workflow"
            echo "should_continue=false" >> $GITHUB_OUTPUT
            exit 0

          else
            echo "✅ Within acceptable wait time (< $MAX_WAIT seconds)"
            echo "📦 Le conteneur sera démarré"
            echo "⏰ L'attente finale se fera DANS le conteneur"
            echo "should_continue=true" >> $GITHUB_OUTPUT
          fi


          echo "======================================"




 



      # ==========================================
      # STEP 3: Registration attempt
      # ==========================================
      - name: Register
        id: registration
        if: steps.check.outputs.should_continue == 'true'
        shell: bash
        env:
          TARGET_DATE: ${{ steps.params.outputs.date }}
          TARGET_TIME: ${{ steps.params.outputs.time }}
          TARGET_DAY: ${{ steps.params.outputs.day }}
          YOUR_SECRET_EMAIL: ${{ secrets.YOUR_SECRET_EMAIL }}
          YOUR_SECRET_PASSWORD: ${{ secrets.YOUR_SECRET_PASSWORD }}
          YOUR_SECRET_LOGON_URL: ${{ secrets.YOUR_SECRET_LOGON_URL }}
          YOUR_SECRET_PLANNING_URL: ${{ secrets.YOUR_SECRET_PLANNING_URL }}
          YOUR_SECRET_LOGIN_URL: ${{ secrets.YOUR_SECRET_LOGIN_URL }}
          YOUR_SECRET_MY_NAME: ${{ secrets.YOUR_SECRET_MY_NAME }}
          YOUR_SECRET_HIS_NAME: ${{ secrets.YOUR_SECRET_HIS_NAME }}
          YOUR_SECRET_APPOINTMENT: ${{ secrets.YOUR_SECRET_APPOINTMENT }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          CALDAV_PASSWORD: ${{ secrets.CALDAV_PASSWORD }}
          CALDAV_USER: ${{ secrets.CALDAV_USER }}



        run: |
            echo "======================================"
            echo "🎾 Pickleball Registration Attempt"
            echo "======================================"
            # Récupérer l'heure cible
            # Récupérer l'heure cible
            TARGET_HOUR=${{ env.TARGET_UTC_HOUR }}
            ADVANCE_SEC=${{ env.ADVANCE_SECONDS }}
            MAX_WAIT=${{ env.MAX_WAIT_SECONDS }}


            echo "📋 Configuration:"
            echo "   🎯 Target: ${TARGET_HOUR}:00:00 UTC"
            echo "   ⏰ Advance: ${ADVANCE_SEC} seconds"

            # ⏰ ATTENTE JUSQU'À L'HEURE CIBLE (MOINS L'AVANCE)


            current_hour=$((10#$(date -u +%H)))
            current_minute=$((10#$(date -u +%M)))
            current_second=$((10#$(date -u +%S)))
            current_total_seconds=$(( (current_hour * 3600) + (current_minute * 60) + current_second ))
              
            # Calcul avec l'avance
            target_total_seconds=$(( (TARGET_HOUR * 3600) - ADVANCE_SEC ))
            diff_seconds=$(( target_total_seconds - current_total_seconds ))
              
            
            echo "🕐 Current UTC time: ${current_hour}:${current_minute}:${current_second}"
            if [ $diff_seconds -gt 0 ]; then
              echo "⏰ Waiting $diff_seconds seconds..."
                
              # Calcul de l'heure de réveil prévue
              wake_hour=$(( (target_total_seconds / 3600) % 24 ))
              wake_minute=$(( (target_total_seconds % 3600) / 60 ))
              wake_second=$(( target_total_seconds % 60 ))
              printf "   Wake up scheduled at: %02d:%02d:%02d UTC\n" $wake_hour $wake_minute $wake_second
              
              sleep $diff_seconds
                
              # Afficher l'heure exacte du réveil
              actual_time=$(date -u +"%H:%M:%S")
              echo "✅ Woke up at: $actual_time UTC"
              echo "   (${ADVANCE_SEC} seconds before ${TARGET_HOUR}:00:00)"
            else
              echo "⚠️ Already past target time (by $((-diff_seconds)) seconds)"
            fi


   

            echo "📅 Date: ${{ steps.params.outputs.date }}"
            echo "🕐 Time: ${{ steps.params.outputs.time }}"

            echo "Pickleball Registration: ${{ steps.params.outputs.day }}"

            
            FINAL_CODE=1
            echo ""
            python3 main.py "${{ steps.params.outputs.date }}" "${{ steps.params.outputs.time }}" "${{ steps.params.outputs.level }}" "$YOUR_SECRET_HIS_NAME" "${{env.HOLD_STATUS}}"
            EXIT_CODE=$?
            echo "📊 Python exit code: $EXIT_CODE"
            
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ Registration successful!"
              FINAL_CODE=0
              break

            fi
            
            echo ""
            echo "📊 Final code: $FINAL_CODE"
            echo "PYTHON_EXIT_CODE=$FINAL_CODE" >> $GITHUB_OUTPUT
            echo "======================================"

            exit 0


      # ==========================================
      # STEP 4: Create success tag
      # ==========================================
      - name: Tag success
        if: steps.check.outputs.should_continue == 'true'  && steps.registration.outputs.PYTHON_EXIT_CODE == '0'
        run: |
          echo "======================================"
          echo "🏷️ Creating success tag"
          echo "======================================"
          target_date="${{ steps.params.outputs.date }}"
          prefix="${{ env.TAG_PREFIX }}"
          tag="${prefix}_bot_success_${target_date}"

          echo "📝 Tag to create: $tag"
          git pull
          # git add all_appointments.json
          #git commit --allow-empty -m "✅ $tag"
          #git commit -m "✅ $tag"
          git tag "$tag" HEAD
          
          echo "📤 Pushing tag to remote..."
          git push origin HEAD "$tag"
          echo "✅ Tag pushed successfully!"
          echo "======================================"


